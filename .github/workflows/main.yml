name: Lint Markdown
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          # Formatted explicitly so the action runner parses the JSON rules correctly
          config: '{"MD013":false,"MD022":false,"MD032":false,"MD033":false,"MD041":false}'
