name: Toolkit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-framework:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infrastructure Code
        uses: actions/checkout@v4

      - name: Verify Markdown Engine Integrity
        uses: gautamkrishnar/markdown-link-check-action@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/linters/.markdown-link-check.json'
          
      - name: Audit Repository Architecture
        run: |
          test -d discovery-engine || exit 1
          test -d impact-engine || exit 1
          echo "Framework directories intact."
